<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="100%" height="100%">
  <!-- Phone Frame background -->
  <rect width="400" height="600" fill="#0f172a" rx="20"/>
  
  <!-- Screen Area -->
  <rect x="15" y="15" width="370" height="570" fill="#ffffff" rx="10"/>
  
  <!-- Navigation bar / Header -->
  <rect x="15" y="15" width="370" height="60" fill="#4f46e5" rx="10"/>
  <rect x="15" y="65" width="370" height="10" fill="#4f46e5"/>
  <text x="35" y="52" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff">Settings</text>
  
  <!-- General Section Header -->
  <text x="35" y="110" font-family="sans-serif" font-size="14" font-weight="bold" fill="#6366f1">GENERAL</text>
  
  <!-- Option 1: Notifications -->
  <rect x="35" y="130" width="330" height="50" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="160" font-family="sans-serif" font-size="14" font-weight="500" fill="#1e293b">Notifications</text>
  <!-- Switch (On) -->
  <rect x="290" y="142" width="50" height="26" fill="#818cf8" rx="13"/>
  <circle cx="327" cy="155" r="10" fill="#ffffff"/>
  
  <!-- Option 2: Privacy -->
  <rect x="35" y="195" width="330" height="50" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="225" font-family="sans-serif" font-size="14" font-weight="500" fill="#1e293b">Privacy</text>
  <!-- Arrow icon -->
  <path d="M 320 215 L 328 220 L 320 225" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Option 3: Account -->
  <rect x="35" y="260" width="330" height="50" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="290" font-family="sans-serif" font-size="14" font-weight="500" fill="#1e293b">Account Details</text>
  <path d="M 320 280 L 328 285 L 320 290" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Preferences Section Header -->
  <text x="35" y="345" font-family="sans-serif" font-size="14" font-weight="bold" fill="#6366f1">PREFERENCES</text>
  
  <!-- Option 4: Dark Mode -->
  <rect x="35" y="365" width="330" height="50" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="395" font-family="sans-serif" font-size="14" font-weight="500" fill="#1e293b">Dark Mode</text>
  <!-- Switch (Off) -->
  <rect x="290" y="377" width="50" height="26" fill="#cbd5e1" rx="13"/>
  <circle cx="303" cy="390" r="10" fill="#ffffff"/>
  
  <!-- Submit button -->
  <g transform="translate(35, 480)">
    <rect width="330" height="48" fill="#4f46e5" rx="8"/>
    <text x="165" y="29" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Save Changes</text>
  </g>
</svg>
