<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <rect width="500" height="500" fill="#f8fafc" rx="8" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Form Header -->
  <text x="50" y="60" font-family="sans-serif" font-size="22" font-weight="bold" fill="#0f172a">Contact Registration Form</text>
  <text x="50" y="85" font-family="sans-serif" font-size="13" fill="#64748b">Please fill in your details below.</text>
  
  <line x1="50" y1="110" x2="450" y2="110" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Field 1: Full Name -->
  <text x="50" y="145" font-family="sans-serif" font-size="13" font-weight="bold" fill="#475569">Full Name</text>
  <rect x="50" y="155" width="400" height="40" fill="#ffffff" rx="6" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="65" y="180" font-family="sans-serif" font-size="14" fill="#94a3b8">Jane Doe</text>
  
  <!-- Field 2: Email Address -->
  <text x="50" y="230" font-family="sans-serif" font-size="13" font-weight="bold" fill="#475569">Email Address</text>
  <rect x="50" y="240" width="400" height="40" fill="#ffffff" rx="6" stroke="#4f46e5" stroke-width="2"/> <!-- Active border -->
  <text x="65" y="265" font-family="sans-serif" font-size="14" fill="#0f172a">jane.doe@example.com</text>
  
  <!-- Checkbox field -->
  <rect x="50" y="315" width="18" height="18" fill="#4f46e5" rx="3"/>
  <!-- Checkmark icon -->
  <path d="M 54 324 L 58 328 L 64 320" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="80" y="329" font-family="sans-serif" font-size="13" fill="#475569">I agree to the Terms of Service</text>
  
  <!-- Action Button -->
  <g transform="translate(50, 380)">
    <rect width="400" height="48" fill="#4f46e5" rx="8"/>
    <text x="200" y="29" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Submit Form</text>
  </g>
</svg>
