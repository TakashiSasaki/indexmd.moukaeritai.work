<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="100%" height="100%">
  <!-- Desk surface (wood color) -->
  <rect width="600" height="500" fill="#d0b49f"/>
  <rect x="20" y="20" width="560" height="460" fill="#e7d4c0" rx="8"/> <!-- Inner desk mat -->
  
  <!-- Desk elements -->
  <!-- 1. Book / Notebook (Left) -->
  <g transform="translate(60, 80) rotate(-5)">
    <rect width="180" height="240" fill="#1e3a8a" rx="4" stroke="#172554" stroke-width="2"/>
    <rect x="15" width="6" height="240" fill="#172554"/> <!-- Spine -->
    <rect x="35" y="30" width="120" height="60" fill="#fef08a" rx="2"/>
    <text x="95" y="65" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e3a8a" text-anchor="middle">JOURNAL</text>
  </g>
  
  <!-- 2. Cup/Coffee Mug (Top Right) -->
  <g transform="translate(450, 100)">
    <!-- Shadow -->
    <ellipse cx="40" cy="50" rx="35" ry="15" fill="#c4a484" opacity="0.6"/>
    <!-- Handle -->
    <path d="M 65 15 C 85 15, 85 45, 65 45" stroke="#ffffff" stroke-width="8" fill="none"/>
    <path d="M 65 15 C 85 15, 85 45, 65 45" stroke="#e11d48" stroke-width="6" fill="none"/>
    <!-- Mug Body -->
    <rect width="70" height="60" fill="#e11d48" rx="6"/>
    <ellipse cx="35" cy="0" rx="35" ry="10" fill="#f43f5e"/>
    <ellipse cx="35" cy="0" rx="28" ry="7" fill="#7c2d12"/> <!-- Coffee -->
  </g>
  
  <!-- 3. Smartphone (Bottom Right) -->
  <g transform="translate(420, 280) rotate(15)">
    <!-- Shadow -->
    <rect x="3" y="3" width="90" height="170" fill="#a88c74" rx="12" opacity="0.6"/>
    <!-- Body -->
    <rect width="90" height="170" fill="#1e293b" rx="12" stroke="#475569" stroke-width="2.5"/>
    <rect x="5" y="5" width="80" height="160" fill="#000000" rx="8"/>
    <!-- Screen active layout -->
    <rect x="5" y="15" width="80" height="130" fill="#312e81" rx="4"/>
    <text x="45" y="80" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">10:42</text>
    <text x="45" y="100" font-family="sans-serif" font-size="9" fill="#a5b4fc" text-anchor="middle">Sunday, June 28</text>
  </g>
  
  <!-- 4. Sticky Note (Center) -->
  <g transform="translate(260, 200) rotate(8)">
    <!-- Shadow -->
    <rect x="2" y="2" width="130" height="130" fill="#a88c74" opacity="0.5"/>
    <!-- Note paper -->
    <rect width="130" height="130" fill="#fef08a" stroke="#fde047" stroke-width="1"/>
    <!-- Pen/pencil trace on sticky note -->
    <text x="15" y="35" font-family="cursive, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Don't forget:</text>
    <text x="15" y="65" font-family="cursive, sans-serif" font-size="12" fill="#0f172a">- Buy organic</text>
    <text x="15" y="85" font-family="cursive, sans-serif" font-size="12" fill="#0f172a">  roasted almonds</text>
    <text x="15" y="110" font-family="cursive, sans-serif" font-size="11" fill="#475569" font-style="italic">Call mom @ 5pm</text>
  </g>
</svg>
