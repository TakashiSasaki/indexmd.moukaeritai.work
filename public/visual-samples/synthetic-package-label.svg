    <rect x="42" width="2" height="50" fill="#000000"/>
    <rect x="48" width="6" height="50" fill="#000000"/>
    <rect x="58" width="1" height="50" fill="#000000"/>
    <rect x="62" width="4" height="50" fill="#000000"/>
    <rect x="70" width="3" height="50" fill="#000000"/>
